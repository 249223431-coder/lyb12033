<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - 班组管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <span class="icon">🏭</span>
                <h1>账号注册</h1>
                <p>加入班组管理平台</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="mb-3">
                {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} py-2 px-3 mb-2 small">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-2">
                    <label class="form-label">用户名 *</label>
                    <input type="text" name="username" class="form-control" placeholder="用于登录" required>
                </div>
                <div class="mb-2">
                    <label class="form-label">真实姓名 *</label>
                    <input type="text" name="real_name" class="form-control" placeholder="您的姓名" required>
                </div>
                <div class="mb-2">
                    <label class="form-label">手机号 *</label>
                    <input type="tel" name="phone" class="form-control" placeholder="手机号码" required>
                </div>
                <div class="mb-2">
                    <label class="form-label">密码 *</label>
                    <input type="password" name="password" class="form-control" placeholder="至少6位" required minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">确认密码 *</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="再次输入密码" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary w-100">注 册</button>
            </form>

            <div class="text-center mt-3">
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none small">已有账号？登录</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
