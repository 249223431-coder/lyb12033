{% extends "base.html" %}
{% block title %}通知详情 - 班组管理{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body p-0">
        <div style="background: linear-gradient(135deg, #ff7043 0%, #ff8a65 100%); padding: 20px; color: #fff; border-radius: 12px 12px 0 0;">
            <div class="d-flex items-center gap-3">
                <div style="width: 44px; height: 44px; background: rgba(255,255,255,0.25); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-calendar-check" style="font-size: 22px;"></i>
                </div>
                <div>
                    <h5 style="font-weight: 700; font-size: 16px; margin: 0;">{{ notification.title }}</h5>
                    <p style="font-size: 12px; opacity: 0.9; margin-top: 2px;">{{ notification.created_at }}</p>
                </div>
            </div>
        </div>

        <div style="padding: 20px;">
            {% if '停机计划' in notification.title %}
                <div style="white-space: pre-wrap; font-size: 15px; line-height: 2.2; color: #333;">{{ notification.content }}</div>
            {% else %}
                <p style="white-space:pre-wrap;font-size:15px;line-height:1.8;color:#333;">{{ notification.content }}</p>
            {% endif %}
        </div>
    </div>
</div>
<a href="{{ url_for('notifications.index') }}" class="btn btn-outline-primary w-100 mt-3" style="border-radius: 12px; padding: 12px;">
    <i class="bi bi-arrow-left"></i> 返回通知列表
</a>
{% endblock %}
