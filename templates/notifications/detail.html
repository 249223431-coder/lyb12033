{% extends "base.html" %}
{% block title %}通知详情 - 班组管理{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h5 style="font-weight:600">{{ notification.title }}</h5>
        <p class="small text-muted mb-3">{{ notification.created_at }}</p>
        <hr>
        <p style="white-space:pre-wrap;font-size:15px;line-height:1.8">{{ notification.content }}</p>
    </div>
</div>
<a href="{{ url_for('notifications.index') }}" class="btn btn-outline-primary w-100 mt-2">返回通知列表</a>
{% endblock %}
