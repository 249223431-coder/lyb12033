{% extends "base.html" %}
{% block title %}电机管理 - 班组管理{% endblock %}
{% block extra_css %}
<style>
.motor-header {
    margin: -12px -12px 14px -12px;
    padding: 22px 18px 16px;
    background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%);
    color: #fff;
    border-radius: 0 0 16px 16px;
}
.motor-header h1 { font-size: 20px; font-weight: 700; margin: 0 0 4px; }
.motor-header p { font-size: 12px; opacity: 0.85; margin: 0; }
.motor-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--card-bg); border-radius: 14px; padding: 18px 16px;
    text-decoration: none; color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    margin-bottom: 10px; transition: transform 0.15s;
}
.motor-card:active { transform: scale(0.98); }
.motor-card-icon {
    width: 50px; height: 50px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
}
.motor-card-info { flex: 1; min-width: 0; }
.motor-card-title { font-size: 16px; font-weight: 600; }
.motor-card-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.motor-card-arrow { font-size: 18px; color: #ccc; }
</style>
{% endblock %}
{% block content %}
<div class="motor-header">
    <h1><i class="bi bi-gear"></i> 电机管理</h1>
    <p>电机台账查询 · 委外维修申请</p>
</div>

<a href="{{ url_for('motor.search') }}" class="motor-card">
    <div class="motor-card-icon" style="background:#e3f2fd;color:#1565c0">
        <i class="bi bi-search"></i>
    </div>
    <div class="motor-card-info">
        <div class="motor-card-title">电机查询</div>
        <div class="motor-card-desc">按编号、名称、位置等搜索电机台账</div>
    </div>
    <i class="bi bi-chevron-right motor-card-arrow"></i>
</a>

<a href="{{ url_for('motor.repair') }}" class="motor-card">
    <div class="motor-card-icon" style="background:#fff3e0;color:#e65100">
        <i class="bi bi-tools"></i>
    </div>
    <div class="motor-card-info">
        <div class="motor-card-title">维修申请</div>
        <div class="motor-card-desc">填写电机委外维修申请，按模板导出</div>
    </div>
    <i class="bi bi-chevron-right motor-card-arrow"></i>
</a>

<a href="{{ url_for('motor.repair_list') }}" class="motor-card">
    <div class="motor-card-icon" style="background:#f3e5f5;color:#7b1fa2">
        <i class="bi bi-list-ul"></i>
    </div>
    <div class="motor-card-info">
        <div class="motor-card-title">维修记录</div>
        <div class="motor-card-desc">查看和导出历史维修申请记录</div>
    </div>
    <i class="bi bi-chevron-right motor-card-arrow"></i>
</a>
{% endblock %}
