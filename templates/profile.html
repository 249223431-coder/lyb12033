{% extends "base.html" %}
{% block title %}个人设置 - 班组管理{% endblock %}
{% block content %}
<div class="section-title"><i class="bi bi-gear"></i>个人设置</div>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">真实姓名</label>
                <input type="text" name="real_name" class="form-control" value="{{ current_user.real_name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">手机号</label>
                <input type="tel" name="phone" class="form-control" value="{{ current_user.phone }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">角色</label>
                <input type="text" class="form-control" value="{{ '管理员' if current_user.is_admin else '普通成员' }}" disabled>
            </div>
            <hr>
            <div class="mb-3">
                <label class="form-label">新密码 (不修改请留空)</label>
                <input type="password" name="new_password" class="form-control" placeholder="至少6位" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100">保存修改</button>
        </form>
    </div>
</div>
{% endblock %}
